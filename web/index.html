<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Audiocodes Bridge UI</title>
    <link href="https://unpkg.com/bootstrap-table@1.18.2/dist/bootstrap-table.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/3.2.0/mdb.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/5.4.0/bootbox.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="https://unpkg.com/bootstrap-table@1.18.2/dist/bootstrap-table.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <script src="contact-client.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container mb-3">

        <section class="p-4 text-center mb-4">
            <section class="text-center">
                <h1>Riva x AudioCodes ASR Demo</h1>
                <h4>AudioCodes API support for RIVA ASR integration</h4>
            </section>

            <!-- Riva Configuration Panel -->
            <section class="mt-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">🎯 Riva Connection Configuration</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <label for="rivaUrl" class="form-label">Riva URL:</label>
                                <input type="text" class="form-control" id="rivaUrl" placeholder="riva-server.com:50051">
                                <small class="text-muted">Format: hostname:port or just hostname (uses port 50051)</small>
                            </div>
                            <div class="col-md-2">
                                <label for="language" class="form-label">Language:</label>
                                <select class="form-control" id="language">
                                    <option value="en-US">English (US)</option>
                                    <option value="en-GB">English (UK)</option>
                                    <option value="es-ES">Spanish</option>
                                    <option value="fr-FR">French</option>
                                    <option value="de-DE">German</option>
                                    <option value="hi-IN">Hindi</option>
                                    <option value="en-hi">Hinglish</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label for="sampleRate" class="form-label">Sample Rate:</label>
                                <select class="form-control" id="sampleRate">
                                    <option value="8000">8000 Hz</option>
                                    <option value="16000" selected>16000 Hz</option>
                                    <option value="24000">24000 Hz</option>
                                    <option value="44100">44100 Hz</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label for="encoding" class="form-label">Encoding:</label>
                                <select class="form-control" id="encoding">
                                    <option value="LINEAR_PCM" selected>LINEAR16</option>
                                    <option value="MULAW">MULAW</option>
                                    <option value="ALAW">ALAW</option>
                                    <option value="FLAC">FLAC</option>
                                </select>
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <button id="updateConfig" class="btn btn-info btn-sm w-100">Update</button>
                            </div>
                            <div class="col-md-1 d-flex align-items-end">
                                <button id="clearConfig" class="btn btn-outline-secondary btn-sm w-100" title="Clear Riva URL to use server defaults">Clear</button>
                            </div>
                        </div>
                        <div class="row mt-2">
                            <div class="col-12">
                                <small class="text-muted">💡 Leave Riva URL empty to use server defaults. Examples: 
                                    <code>riva.company.com:50052</code>, 
                                    <code>10.0.1.100:50051</code>, 
                                    <code>localhost:50051</code>
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

        </section>

        <div class="row">
            <div id="transcription_col" class="col">
                <div class="card border h-100">
                    <div class="card-header">
                        <!-- TODO: make this header stay the same height as the concept card header -->
                        <div class="row">
                            <div class="align-self-end col mb-0">
                                <label class="mb-0" for="riva-btn">RIVA ASR transcription</label>
                            </div>
                            <div class="d-flex flex-row-reverse col-sm-2 mb-0">
                                <button id="riva-btn" type="submit" class="btn btn-primary btn-sm w-100"
                                    disabled>Start</button>
                            </div>
                            <div class="d-flex flex-row-reverse col-sm-2 mb-0">
                                <button id="riva-btn-stop" type="submit" class="btn btn-primary btn-sm w-100"
                                    disabled>Stop</button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3 mx-1">
                            <div id="transcription_card" class="card card-body scrollable">
                                <div id="transcription_area">
                                </div>
                            </div>
                        </div>

                        <!-- AREA FOR SHOWING INPUT FIELD -->
                        <div class="row mx-1">
                            <div class="col-sm-12 px-0">
                                <div class="row">
                                    <div class="col">
                                        <input type="text" class="form-control form-control-sm" id="input_field">
                                    </div>
                                    <div class="col-sm-2">
                                        <button id="mute-btn" type="submit" class="btn btn-primary btn-xs w-100"
                                            data-mdb-toggle="tooltip" data-mdb-placement="top" title="Mute">
                                            <i class="icon-mute"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>

</html>
